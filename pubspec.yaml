name: celebray
description: "Remember and celebrate birthdays, anniversaries, and milestones with smart reminders."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_crashlytics: ^5.0.7
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  flutter_secure_storage: ^10.3.1
  equatable: ^2.1.0
  shared_preferences: ^2.5.5
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2
  sqflite: ^2.4.2
  path: ^1.9.1
  riverpod_annotation: ^4.0.3
  uuid: ^4.5.3
  intl: ^0.20.3
  timeago: ^3.7.1
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  table_calendar: ^3.2.0
  share_plus: ^11.0.0
  http: ^1.4.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  google_fonts: ^8.1.0
  device_calendar: ^3.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: assets/app_icon.png

flutter_native_splash:
  color: "#111111"
  image: assets/app_icon.png
  android_12:
    color: "#111111"
    image: assets/app_icon.png

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false

  assets:
    - assets/
